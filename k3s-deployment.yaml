apiVersion: v1
kind: Namespace
metadata:
  name: amcdan10
---
apiVersion: v1
kind: Secret
metadata:
  name: projectboard-env
  namespace: amcdan10
type: Opaque
stringData:
  DATABASE_URL: mysql://projectboard:projectboard-password@mariadb:3306/projectboard
  AUTH_SECRET: u2JrdHSkiA1L1wDnrSgreOXoEpH9pU++GbUP1qvCw/X3VkD+FbNtc7oncbLCvKYo
  AUTH_URL: https://projectboard.k3s.local
  MARIADB_DATABASE: projectboard
  MARIADB_USER: projectboard
  MARIADB_PASSWORD: projectboard-password
  MARIADB_ROOT_PASSWORD: rootpassword
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: amcdan10
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: amcdan10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: MARIADB_DATABASE
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: MARIADB_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: MARIADB_PASSWORD
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: MARIADB_ROOT_PASSWORD
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: amcdan10
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectboard
  namespace: amcdan10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projectboard
  template:
    metadata:
      labels:
        app: projectboard
    spec:
      containers:
        - name: projectboard
          image: ghcr.io/andrewmcdan/projectboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: AUTH_SECRET
            - name: AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: projectboard-env
                  key: AUTH_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: projectboard
  namespace: amcdan10
spec:
  selector:
    app: projectboard
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: projectboard
  namespace: amcdan10
spec:
  ingressClassName: traefik
  rules:
    - host: projectboard.k3s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: projectboard
                port:
                  number: 80
